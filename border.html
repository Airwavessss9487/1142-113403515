<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Image Styling - Exact Dimensions</title>
    <style>
        body {
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background-color: #ffffff;
        }

        .wrapper {
            display: flex;
            align-items: center; /* Aligns items vertically in the center */
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
        }

        /* Image 1: width 33%, height 300px (implied), radius 18px, no distortion */
        .box-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover; /* Key for "no distortion" */
            display: block;
        }

        /* Image 2: circle, size 150px, border, no distortion */
        .box-center {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* Makes it a circle */
            border: 1px solid #000; /* border 150px label likely refers to circle size */
            object-fit: cover; /* Key for "no distortion" */
        }

        /* Image 3: width 33%, height 300px, distortion */
        .box-right {
            width: 33%;
            height: 300px;
            object-fit: fill; /* Key for "distortion" - stretches to fit */
            display: block;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="https://picsum.photos/id/10/800/1000" class="box-left" alt="No Distortion">

        <img src="https://picsum.photos/id/1011/500/500" class="box-center" alt="Circle">

        <img src="https://picsum.photos/id/10/800/1000" class="box-right" alt="Distortion">
    </div>

</body>
</html>
