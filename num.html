<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動網頁練習</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            text-align: left;
            background: white;
            padding: 40px;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            width: 200px;
        }

        #displayText {
            font-size: 32px;
            margin-bottom: 30px;
            color: black;
            transition: color 0.3s;
            height: 40px; /* 固定高度防止文字改變時跳動 */
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            border: 1px solid #999;
            border-radius: 3px;
        }

        button:active {
            background: #d0d0d0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="displayText">Hello</div>
        <button id="actionButton">Button</button>
    </div>

    <script>
        const textElement = document.getElementById('displayText');
        const buttonElement = document.getElementById('actionButton');

        // 1. 滑鼠移入按鈕 (Mouse over)
        buttonElement.addEventListener('mouseover', function() {
            textElement.style.color = 'magenta'; // 變為粉紅色
            textElement.textContent = 'Hello';    // 內容保持 Hello
        });

        // 2. 滑鼠移出按鈕 (恢復原狀，可選)
        buttonElement.addEventListener('mouseout', function() {
            // 如果希望移開後變回黑色，取消下面註解
            // textElement.style.color = 'black';
        });

        // 3. 滑鼠點擊按鈕 (Mouse click)
        buttonElement.addEventListener('click', function() {
            textElement.style.color = 'magenta';     // 保持粉紅色
            textElement.textContent = 'Mouse Click'; // 改變文字內容
        });
    </script>

</body>
</html>
