<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            position: relative;
            padding: 50px;
        }

        .rectangle {
            width: 200px;
            height: 150px;
            background-color: blue;
            border: 5px solid black;
            position: absolute;
            z-index: 1;
        }

        .circle {
            width: 120px;
            height: 120px;
            background-color: yellow;
            border: 5px solid red;
            border-radius: 50%;
            position: absolute;
            top: 65px;
            left: 150px;
            z-index: 2;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="rectangle"></div>
    <div class="circle"></div>
</div>

</body>
</html>
