<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .h1-style {
            font-size: 32px;
            font-weight: bold;
            text-decoration: overline;
            text-decoration-thickness: 3px;
            text-shadow: 2px 2px 2px pink;
            margin-bottom: 30px;
        }

        .h2-style {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            border: 2px solid yellow;
            outline: 1px solid black;
            padding: 2px;
            margin-bottom: 30px;
        }

        .h3-container {
            text-align: right;
        }

        .h3-style {
            font-size: 18px;
            font-weight: bold;
            text-decoration: underline;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="h1-style">This is heading 1</div>

    <div class="h2-style">This is heading 2</div>

    <div class="h3-container">
        <div class="h3-style">This is heading 3</div>
    </div>

</body>
</html>
