<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            width: 450px;
            padding: 20px;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .row {
            margin: 15px 0;
            padding: 8px 15px;
            font-family: "Times New Roman", Times, serif;
            font-size: 32px;
            font-weight: bold;
        }

        .box1 {
            background-color: #ADD8E6;
            border: 5px double #FF6347;
        }

        .box2 {
            background-color: #FFFF00;
            border: 3px solid #1E90FF;
            border-radius: 12px;
        }

        .box3 {
            background-color: #3CB371;
            border: 8px dotted #808080;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row box1">Hello World</div>
    <div class="row box2">Hello World</div>
    <div class="row box3">Hello World</div>
</div>

</body>
</html>
