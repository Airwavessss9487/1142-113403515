<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS Positioning Assignment</title>
    <style>
        /* 基礎頁面設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f0f0f0; /* 外圍深灰色背景 */
        }

        /* 白色底容器（畫布） */
        .canvas {
            background-color: white;
            padding: 40px;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 700px;         /* 設定固定寬度 */
            min-height: 250px;    /* 設定最小高度 */
            margin: 0 auto;       /* 居中顯示 */
            
            /* 關鍵：讓內部的 absolute 元素以這裡為基準 */
            position: relative;   
        }

        /* 表格樣式 */
        table {
            border-collapse: collapse;
            width: 250px;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
            font-weight: bold;
        }

        th {
            background-color: #7f7f7f;
            color: white;
        }

        /* 黃色背景列 */
        tr:nth-child(2), tr:nth-child(4) {
            background-color: #ffff00;
        }

        /* --- 修正後的綠色框框 --- */
        .fixed-box {
            /* 改用 absolute，它會對齊最近的 relative 父層（即 .canvas） */
            position: absolute;   
            top: 40px;            /* 距離白色畫布上方 40px */
            right: 40px;          /* 距離白色畫布右方 40px */
            
            width: 180px;
            height: 120px;
            border: 4px solid #76b900; /* 綠色粗框 */
            padding: 10px;
            background-color: white;
            font-size: 18px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="canvas">
        
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>

        <div class="fixed-box">
            This div element has position: absolute;
        </div>

    </div>

</body>
</html>
