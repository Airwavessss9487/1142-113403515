<!DOCTYPE html>
<html>
<head>
  <title>My Page</title>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }

    th, td {
      width: 100px;
      height: 40px;
      padding: 5px;
    }

    th {
      background-color: gray;
      color: white;
    }

    .yellow {
      background-color: yellow;
    }

    div {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 150px;
      border: 2px solid green;
      padding: 10px;
      background-color: white;
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>Firstname</th>
      <th>Lastname</th>
    </tr>
    <tr class="yellow">
      <td>1</td>
      <td>1</td>
    </tr>
    <tr>
      <td>2</td>
      <td>2</td>
    </tr>
    <tr class="yellow">
      <td>3</td>
      <td>3</td>
    </tr>
  </table>

  <div>
    This div element has position: fixed;
  </div>

</body>
</html>
