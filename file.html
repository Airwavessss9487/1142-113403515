<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Web Page Project</title>
    <style>
        /* 表格樣式 */
        table {
            border-collapse: collapse;
            width: 300px;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }

        /* 表頭灰色背景 */
        th {
            background-color: #808080;
            color: white;
        }

        /* 黃色背景的單數列 (1, 3) */
        tr:nth-child(even) {
            background-color: #ffff00;
        }

        /* 白色背景的偶數列 (2) */
        tr:nth-child(odd):not(:first-child) {
            background-color: #ffffff;
        }

        /* 固定定位的 DIV 樣式 */
        .fixed-div {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 100px;
            border: 3px solid #76b900; /* 綠色邊框 */
            padding: 10px;
            background-color: white;
            font-family: Arial, sans-serif;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-div">
        This div element has position: fixed;
    </div>

</body>
</html>
