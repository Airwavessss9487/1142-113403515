<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS Positioning Assignment</title>
    <style>
        /* 基礎頁面設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f0f0f0; /* 背景淺灰色，模擬截圖效果 */
        }

        /* 外層容器（模擬截圖中的白色畫布） */
        .canvas {
            background-color: white;
            padding: 40px;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            min-height: 300px;
            position: relative;
        }

        /* 表格樣式 */
        table {
            border-collapse: collapse;
            width: 300px;
            background-color: white;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
            font-weight: bold;
        }

        /* 表頭灰色背景，白字 */
        th {
            background-color: #7f7f7f;
            color: white;
        }

        /* 第 1、3 列（黃色背景） */
        tr:nth-child(2), tr:nth-child(4) {
            background-color: #ffff00;
        }

        /* 第 2 列（白色背景） */
        tr:nth-child(3) {
            background-color: #ffffff;
        }

        /* --- 關鍵重點：右上角綠色框框 --- */
        .fixed-box {
            position: fixed;        /* 固定定位：不隨捲軸移動 */
            top: 20px;             /* 距離視窗上方 20px */
            right: 20px;           /* 距離視窗右方 20px */
            width: 180px;          /* 方塊寬度 */
            height: 120px;         /* 方塊高度 */
            border: 4px solid #76b900; /* 綠色粗框 (重點在此) */
            padding: 10px;         /* 框內文字與邊界的距離 */
            background-color: white; /* 框內背景色 */
            font-size: 18px;
            box-sizing: border-box; /* 確保邊框不會撐大寬度 */
        }
    </style>
</head>
<body>

    <div class="canvas">
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>

        <div class="fixed-box">
            This div element has position: fixed;
        </div>
    </div>

</body>
</html>
