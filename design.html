<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Center Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #f6f6f6;
            --list-bg: #ffffff;
            --list-border: #eaeaea;
            --list-select: #e8f3ff;
            --list-select-border: #cfddff;
            --bottom-bg: #f3f3f3;
            --text-main: #2f2f2f;
            --text-secondary: #707070;
            --accent-blue: #0084ff;
            --border-grey: #f2f2f2;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Main Container */
        .app-container {
            width: 800px;
            height: 500px;
            background: white;
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 40px 1fr 40px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Header Area */
        .header {
            grid-column: 1 / 3;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--list-border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            color: var(--text-main);
        }

        /* Left Sidebar - File List */
        .sidebar {
            background-color: var(--list-bg);
            border-right: 1px solid var(--list-border);
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid var(--list-border);
            font-size: 13px;
            color: var(--text-main);
        }

        .file-item.selected {
            background-color: var(--list-select);
            border-bottom-color: var(--list-select-border);
        }

        .status-bar {
            height: 10px;
            flex-grow: 1;
            background: #4ade80; /* Green bar from design */
            margin-left: 10px;
            border-radius: 2px;
        }

        /* Main Content - Preview */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .preview-box {
            width: 450px;
            height: 240px;
            background-color: #eee;
            border: 1px solid var(--border-grey);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-size: 13px;
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Action Button (The h22/R8 Button) */
        .action-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid var(--border-grey);
            font-size: 13px;
            color: var(--text-main);
            padding: 0 10px;
            cursor: pointer;
        }

        /* Bottom Status Area */
        .footer {
            grid-column: 1 / 3;
            background-color: var(--bottom-bg);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Right Detail Overlay (Small blue-box preview in design) */
        .detail-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 250px;
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            font-size: 12px;
            box-shadow: -2px 2px 10px rgba(0,0,0,0.05);
        }

        .detail-row { margin-bottom: 4px; }
        .label { color: #0084ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span style="margin-right: 20px;">名稱</span>
        <span style="margin-left: auto;">預覽</span>
    </div>

    <div class="sidebar">
        <div class="file-item selected">
            <input type="checkbox" checked> 20171012_1.jpg
            <div class="status-bar"></div>
        </div>
        <div class="file-item"><input type="checkbox" checked> 20171012_2.jpg <div class="status-bar"></div></div>
        <div class="file-item"><input type="checkbox" checked> 20171012_3.jpg <div class="status-bar"></div></div>
        <div class="file-item"><input type="checkbox" checked> 20171012_4.jpg <div class="status-bar"></div></div>
        <div class="file-item"><input type="checkbox" checked> 20171012_5.jpg <div class="status-bar"></div></div>
    </div>

    <div class="main-content">
        <button class="action-btn">查看資訊</button>
        
        <div class="preview-box">
            <img src="https://via.placeholder.com/450x240/f8b400/ffffff?text=Default+450x240" alt="Preview" class="preview-img">
            <span>Default 450x240</span>
        </div>

        <div class="detail-overlay">
            <div style="text-align: right; color: var(--text-secondary); cursor: pointer;">收起資訊 ▲</div>
            <div class="detail-row"><span class="label">修改日期：</span>2017/10/12</div>
            <div class="detail-row"><span class="label">類別：</span>JPG</div>
            <div class="detail-row"><span class="label">大小：</span>466.97KB</div>
            <div class="detail-row" style="font-size: 10px; color: #999; word-break: break-all;">
                \\designcenter.qnap.com.tw\DesignCenter\PM-RD...
            </div>
        </div>
    </div>

    <div class="footer">
        數量：64 / 100
    </div>
</div>

</body>
</html>
