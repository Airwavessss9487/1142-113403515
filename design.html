<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Image Styling Layout</title>
    <style>
        /* Container to align all three elements exactly as shown */
        .image-layout-container {
            display: flex;
            justify-content: space-between; /* Space out to 33% / 150px / 33% */
            align-items: center;           /* Vertically centers the middle circle */
            width: 100%;
            max-width: 1200px;
            margin: 50px auto;
            gap: 10px;                     /* Minimal gap between items */
        }

        /* 1. Left Image: width 33%, height 300px, radius 18px, no distortion */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;             /* Maintains aspect ratio (no distortion) */
            display: block;
        }

        /* 2. Middle Image: circle, size 150px, border, no distortion */
        .img-middle {
            width: 150px;
            height: 150px;
            border-radius: 50%;            /* Creates the circle shape */
            border: 1px solid #000;        /* Black border as indicated */
            object-fit: cover;             /* Maintains aspect ratio (no distortion) */
            display: block;
        }

        /* 3. Right Image: width 33%, height 300px, WITH distortion */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill;              /* Forces the image to stretch (distortion) */
            display: block;
        }

        /* Responsive adjustment for small screens */
        @media (max-width: 600px) {
            .image-layout-container {
                flex-direction: column;
            }
            .img-left, .img-right {
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <div class="image-layout-container">
        <img src="https://picsum.photos/id/10/800/1200" class="img-left" alt="Rounded No Distortion">

        <img src="https://picsum.photos/id/1011/500/500" class="img-middle" alt="Circle Border">

        <img src="https://picsum.photos/id/10/800/1200" class="img-right" alt="Distortion">
    </div>

</body>
</html>
